# fly.toml app configuration file generated for ai-trader-dawn-headland-9477 on 2026-06-16T09:58:20+07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ai-trader-dawn-headland-9477'
primary_region = 'sin'

[build]

[env]
  BINANCE_TESTNET = 'true'
  LOOP_INTERVAL_SECONDS = '3600'
  PAPER_TRADING = 'false'
  LIVE_TRADING_ENABLED = 'true'
  TRADING_SYMBOL = 'BTC/USDT'
  MAX_POSITION_PCT = '0.25'    # 25%/trade — spot has no liquidation (×confidence)
  MAX_OPEN_POSITIONS = '5'
  DAILY_LOSS_LIMIT_PCT = '0.03'
  CONFIDENCE_THRESHOLD = '0.6'
  MAX_DRAWDOWN_LIMIT_PCT = '0.10'
  MAX_EXPOSURE_PCT = '0.80'
  DAILY_REPORT_ENABLED = 'true'
  WEEKLY_REPORT_ENABLED = 'true'
  SUPERVISOR_RESTART_DELAY_SECONDS = '5'

  # Legacy single-loop fallback only. LOOPn_* settings override these.
  ARBITER_MODE = 'rule'
  STRATEGY_MODE = 'rule_based'
  USE_ML_MODEL = 'false'

  # LOOP1 — hybrid: ema_cross gatekeeper + real Claude validator.
  LOOP1_STRATEGY = 'ema_cross'
  LOOP1_STRATEGY_MODE = 'hybrid'
  LOOP1_ARBITER_MODE = 'none'
  LOOP1_USE_ML_MODEL = 'false'
  LOOP1_EXIT_ON_OPPOSITE_SIGNAL = 'false'
  LOOP1_TIMEFRAME = '1h'
  LOOP1_MODE = 'LIVE'
  LOOP1_ALLOCATION_PCT = '0.50'
  LOOP1_ATR_SL_MULT = '3.0'
  LOOP1_ATR_TP_MULT = '3.0'

  # LOOP2 — unchanged: fixed rsi_macd rule strategy.
  LOOP2_STRATEGY = 'rsi_macd'
  LOOP2_STRATEGY_MODE = 'rule_based'
  LOOP2_ARBITER_MODE = 'none'
  LOOP2_USE_ML_MODEL = 'false'
  LOOP2_EXIT_ON_OPPOSITE_SIGNAL = 'true'
  LOOP2_TIMEFRAME = '4h'
  LOOP2_MODE = 'LIVE'
  LOOP2_ALLOCATION_PCT = '0.50'
  LOOP2_RSI_OVERSOLD = '35'
  LOOP2_RSI_OVERBOUGHT = '65'
  LOOP2_RSI_MACD_LONG_ONLY = 'false'
  LOOP2_RSI_MACD_TREND_EMA = '0'
  LOOP2_ATR_SL_MULT = '2.0'
  LOOP2_ATR_TP_MULT = '3.0'

  # Listen on IPv6 (::) — Fly's private 6PN network (what `fly proxy` reaches via
  # <app>.internal) is IPv6-only; 0.0.0.0 binds IPv4 only and is unreachable there.
  # :: is dual-stack so it still accepts IPv4. Still not public — no [http_service];
  # API_KEY secret guards it.
  API_HOST = '::'

[[mounts]]
  source = 'data'
  destination = '/app/db'

# No [http_service]: this is a 24/7 background worker, not a public web app.
# Re-adding it with auto_stop_machines would let Fly halt the trading loop when
# idle. For private backend/admin API access, use `fly proxy 8000:8000` and keep
# API_KEY configured.

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1024mb'
