# fly.toml app configuration file generated for ai-trader-dawn-headland-9477 on 2026-06-16T09:58:20+07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ai-trader-dawn-headland-9477'
primary_region = 'sin'

[build]

[env]
  BINANCE_TESTNET = 'true'
  LOOP_INTERVAL_SECONDS = '3600'
  PAPER_TRADING = 'true'
  TRADING_SYMBOL = 'BTC/USDT'
  MAX_POSITION_PCT = '0.25'    # 25%/trade — spot has no liquidation (×confidence)

  # Multi-loop (plan B/C): two best-fit strategies run concurrently on ONE spot
  # account, positions attributed per strategy. LOOPn_* overrides STRATEGY_MODE.
  ARBITER_MODE = 'rule'

  # LOOP1 — ema_cross 1h, ATR 3/3 (backtest: win-rate 80%, +420 / 2yr)
  LOOP1_STRATEGY = 'ema_cross'
  LOOP1_TIMEFRAME = '1h'
  LOOP1_ATR_SL_MULT = '3.0'
  LOOP1_ATR_TP_MULT = '3.0'

  # LOOP2 — rsi_macd 4h, default mean-reversion (win-rate 57%, +67 / 2yr, Sharpe 27)
  LOOP2_STRATEGY = 'rsi_macd'
  LOOP2_TIMEFRAME = '4h'
  LOOP2_RSI_OVERSOLD = '35'
  LOOP2_RSI_OVERBOUGHT = '65'
  LOOP2_RSI_MACD_LONG_ONLY = 'false'
  LOOP2_RSI_MACD_TREND_EMA = '0'
  LOOP2_ATR_SL_MULT = '2.0'
  LOOP2_ATR_TP_MULT = '3.0'

  # Listen on IPv6 (::) — Fly's private 6PN network (what `fly proxy` reaches via
  # <app>.internal) is IPv6-only; 0.0.0.0 binds IPv4 only and is unreachable there.
  # :: is dual-stack so it still accepts IPv4. Still not public — no [http_service];
  # API_KEY secret guards it.
  API_HOST = '::'

[[mounts]]
  source = 'data'
  destination = '/app/db'

# No [http_service]: this is a 24/7 background worker, not a web app. Re-adding it
# with auto_stop_machines would let Fly halt the trading loop when idle. Reach the
# dashboard via `fly proxy 8000:8000` (set API_HOST=0.0.0.0 + API_KEY secrets first).

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1024mb'
