name: Pull Request Release Safety

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  release-safety:
    name: release-safety
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e ".[dev]"

      - name: Run release-safety pytest gate
        run: .venv/bin/python -m pytest tests/test_api.py tests/test_telegram.py tests/test_telegram_multiloop.py tests/test_telegram_health_monitor.py tests/test_reports_scheduler.py tests/test_trading_loop_daily_reset.py tests/test_go_live_safety.py tests/test_live_controller.py tests/test_shutdown_cleanup.py -q
